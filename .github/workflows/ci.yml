name: Lighthouse CI

on: [push]

jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install dependencies
        run: cd shell-app && npm install --legacy-peer-deps
      - name: Build shell app
        run: cd shell-app && npm run build
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli serve
          serve -s shell-app/build -p 3000 &
          sleep 3
          lhci autorun --collect.url=http://localhost:3000 --collect.numberOfRuns=1 --upload.target=temporary-public-storage